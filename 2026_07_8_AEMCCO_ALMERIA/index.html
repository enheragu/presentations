  /* Escenario a tamaño de DISEÑO (1280×720) escalado a la pantalla (scale-to-fit).

  #scaler{

/* ===========================================================
   CONTRAPORTADA — espejo de la portada, versión completa.
   ADITIVO: pegar dentro del <style> de index.html, justo tras el
   bloque "--- Portada / contraportada wordmark ---" (línea ~96,

/* Autores — justo bajo el título y "un poco desplazado arriba":

.authors{
  margin-top: .3em;
  font-size: 1.28rem;
  line-height: 1.32;
  font-weight: 600;
  letter-spacing: .01em;
  color: rgb(var(--ink));
  opacity: .92;
  max-width: 48ch;
  margin-left: auto;
  margin-right: auto;
}
/* Ponente resaltado (el titular del email de contacto). */
.authors .me{ font-weight: 800; }   /* el ponente: mismo color (negro), en negrita — sin color aparte */

/* Afiliación — tipografía de apoyo, mayúsculas espaciadas en morado de
   marca, como las líneas secundarias de la plantilla del congreso. */
.affil{
  margin-top: .28em;
  font-size: .98rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  font-weight: 600;

  opacity: .9;
}
.affil .sep{ opacity: .5; margin: 0 .5em; }   /* mismo separador que .meta .sep */

/* "Gracias" en grande — modificador del wordmark serif (Georgia).

   autores arriba y a la info del congreso abajo. */
.wordmark.thanks{
  font-size: 4.9rem;
  margin: .22em 0 .06em;
  line-height: 1.08;
}

/* Email de contacto — acento teal, mismo aire que .meta pero en

  /* mención mínima del congreso en la contraportada (sin fechas) */

    color:rgba(var(--ink),.5); }

  /* QR de seguimiento en las primeras slides — abajo-dcha; sale por el lateral en la slide 6 */

<body>

      &nbsp;·&nbsp; <span class="key">F</span> pantalla completa
    </div>

    </div>
  </div>

  <!-- Opcional: pega aquí el contenido de slides.md si quieres que funcione con
       doble-clic (file://) sin servidor. Si está vacío, se carga slides.md por HTTP. -->
  <script type="text/markdown" id="slides-src"></script>

<script src="widgets.js"></script>
<script>
/* ============================================================
   1) Parser mínimo de slides.md  → construye el deck
   2) Motor de olas + navegación
   ============================================================ */
(async () => {
  "use strict";

  /* ---------- carga del contenido ---------- */
  async function loadSlides(){
    const inline = document.getElementById('slides-src');
    if (inline && inline.textContent.trim()) return inline.textContent;  // modo offline
    try{
      const r = await fetch('slides.md', {cache:'no-cache'});
      if (r.ok) return await r.text();
      throw 0;
    }catch(_){
      document.getElementById('deck').innerHTML =
        '<section class="slide active"><div class="wrap"><h2>Sirve la carpeta por HTTP</h2>'+
        '<p class="lead">El navegador no deja leer <code>slides.md</code> con doble-clic '+
        '(<code>file://</code>). Ábrelo con el servidor local — '+
        '<code>localhost:8000/presentations/…</code> — o en GitHub Pages. '+
        '(Alternativa: pega el markdown en el <code>&lt;script id="slides-src"&gt;</code>).</p></div></section>';
      return null;
    }
  }

  /* ---------- markdown mínimo (con paso de HTML crudo) ---------- */
  const inline = s => s
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img class="slide-img" alt="$1" src="$2">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');

  function renderText(block){
    let out='', para=[];
    const flush = () => { if(para.length){ out += `<p class="lead">${inline(para.join(' '))}</p>`; para=[]; } };
    for (const raw of block.split('\n')){
      const s = raw.trim();
      if (/^# /.test(s))        { flush(); out += `<h1>${inline(s.slice(2))}</h1>`; }
      else if (/^## /.test(s))  { flush(); out += `<h2>${inline(s.slice(3))}</h2>`; }
      else if (/^### /.test(s)) { flush(); out += `<h3 class="kicker">${inline(s.slice(4))}</h3>`; }
      else if (/^> /.test(s))   { flush(); out += `<div class="kicker">${inline(s.slice(2))}</div>`; }
      else if (/^!\[[^\]]*\]\([^)]+\)$/.test(s)) { flush(); out += inline(s); } // imagen sola
      else if (s) para.push(s);
      else flush();
    }
    flush();
    return out;
  }

  function renderBody(body){
    let out='';
    for (let block of body.replace(/\r/g,'').split(/\n[ \t]*\n/)){
      block = block.replace(/^\n+|\n+$/g,'');
      if (!block.trim()) continue;
      if (block.trimStart().startsWith('<')) out += block;   // HTML crudo tal cual
      else out += renderText(block);
    }
    return out;
  }

  function buildDeck(md){
    md = md.replace(/\x3c!--[\s\S]*?--\x3e/g, '');           // fuera comentarios (escapes: evita <!-- --> literal en <script>)
    const parts = md.split(/^---[ \t]*(.*)$/m);               // [preámbulo, opts, body, opts, body, ...]
    let html='';
    for (let i=1; i<parts.length; i+=2){
      const opts = (parts[i]||'').trim();
      const body = parts[i+1] || '';
      let depth='0', nobrand='', wide='', vd='', center='', zqr='';
      for (const tk of opts.split(/\s+/).filter(Boolean)){
        if (tk.includes(':')){ const [k,v]=tk.split(':'); if(k==='depth') depth=v; }
        else if (tk==='nobrand') nobrand=' data-nobrand';
        else if (tk==='wide')    wide=' style="max-width:1240px"';
        else if (tk==='void')    vd=' data-void';
        else if (tk==='center')  center=' center';
        else if (tk==='midv')    center+=' midv';
        else if (tk==='bodyc')   center+=' bodyc';
        else if (tk==='portada') center+=' portada';
        else if (tk==='zenqr')   zqr=' data-zenqr';
      }
      html += `<section class="slide${center}" data-depth="${depth}"${nobrand}${vd}${zqr}><div class="wrap"${wide}>${renderBody(body)}</div></section>`;
    }
    document.getElementById('deck').innerHTML = html || '';
  }

  /* ---------- arranque ---------- */
  const md = await loadSlides();
  if (md === null) return;
  buildDeck(md);
  if (window.MLVWidgets) { await MLVWidgets.load(); MLVWidgets.mountAll(document.getElementById('deck')); }

  const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const slides = [...document.querySelectorAll('.slide')];
  const N = slides.length || 1;
  const hudNum = document.getElementById('hudNum');
  const progress = document.getElementById('progress');
  const brandbar = document.getElementById('brandbar');
  const deckqr = document.getElementById('deckqr');
  const zenqr = document.getElementById('zenqr');
  const vignette = document.getElementById('vignette');
  const deckTimer = document.getElementById('deckTimer');
  const congressStrip = document.getElementById('congressStrip');

  let idx = 0, depth = 0, depthTarget = 0;
  let voidAmt = 0, voidTarget = 0;           // slide "void": funde las olas a negro total
  const pad = n => String(n).padStart(2,'0');

  function show(n){
    n = Math.max(0, Math.min(N-1, n));
    idx = n;
    slides.forEach((s,i)=> s.classList.toggle('active', i===n));
    hudNum.textContent = `${pad(n+1)} / ${pad(N)}`;
    progress.style.width = (N>1 ? n/(N-1)*100 : 100) + '%';
    depthTarget = parseFloat(slides[n]?.dataset.depth || '0');
    voidTarget = slides[n]?.hasAttribute('data-void') ? 1 : 0;
    brandbar.style.setProperty('--brand-op', slides[n]?.hasAttribute('data-nobrand') ? '0' : '1');
    if (deckqr) deckqr.classList.toggle('qr-out', n >= 4);   // visible slides 1–4 (idx 0–3); sale en la slide 5 (idx 4, donde el gag ocupa todo)
    if (zenqr) {   // QR de Zenodo: badge abajo-dcha en recurso+conclusiones; en la contra el CUADRO viaja a su sitio y se queda (el QR destino #zenqrHome está oculto)
      const sl = slides[n];
      const home = (sl && !sl.hasAttribute('data-zenqr')) ? sl.querySelector('#zenqrHome') : null;
      if (sl?.hasAttribute('data-zenqr')) {              // slides 20–21: badge normal abajo-dcha (con etiqueta)
        zenqr.classList.remove('qr-out', 'flown'); zenqr.style.transform = ''; zenqr.style.opacity = ''; zenqr.style.pointerEvents = '';
      } else if (home) {                                 // contra: el cuadro viaja hasta el sitio de «Gracias» y se queda como QR final
        zenqr.classList.remove('qr-out'); zenqr.classList.add('flown');   // 'flown' quita la etiqueta → solo viaja el cuadro
        zenqr.style.transition = 'none'; zenqr.style.transform = ''; zenqr.style.opacity = '1'; zenqr.style.pointerEvents = 'none';
        void zenqr.offsetWidth;                          // reflow: parte de la esquina, ya sin etiqueta
        const zr = zenqr.getBoundingClientRect(), s = (zr.width / zenqr.offsetWidth) || 1;
        const hr = home.getBoundingClientRect();
        const sc = hr.width / zr.width;                        // encaja el cuadro en el hueco del QR destino (sin taparle la etiqueta DOI)
        const dx = ((hr.left + hr.width / 2) - (zr.left + zr.width / 2)) / s;
        const dy = ((hr.top + hr.height / 2) - (zr.top + zr.height / 2)) / s;
        zenqr.style.transition = ''; void zenqr.offsetWidth;   // re-activa la transición (.ready) → anima el trayecto
        zenqr.style.transformOrigin = 'center center';
        zenqr.style.transform = `translate(${dx}px, ${dy}px) scale(${sc})`;   // se queda (opacity 1) como QR final; #zenqrHome sigue oculto
      } else {                                           // resto: fuera por la derecha
        zenqr.classList.add('qr-out'); zenqr.classList.remove('flown'); zenqr.style.transform = ''; zenqr.style.opacity = ''; zenqr.style.pointerEvents = '';
      }
    }
    if (congressStrip) congressStrip.style.setProperty('--congress-op',
      (slides[n]?.hasAttribute('data-nobrand') && !slides[n]?.hasAttribute('data-void')) ? '1' : '0');   // franja del congreso: todas las de contenido menos el vacío
    if (congressStrip){   // tipografía del congreso en dos versiones: original (slides claras) / clara (oscuras)
      const lite = parseFloat(slides[n]?.dataset.depth || '0') < 0.3;
      const t = congressStrip.querySelector('.cs-title-img'), w = congressStrip.querySelector('.cs-word-img');
      if (t) t.src = lite ? 'assets/congress-title.png' : 'assets/congress-title-hdr.png';
      if (w) w.src = lite ? 'assets/congress-wordmark.png' : 'assets/congress-wordmark-hdr.png';
    }
    if (slides[n]?.querySelector('#mlvFrame')) loadWidget();
    if (window.MLVWidgets) { slides.forEach(s => MLVWidgets.deactivate(s)); MLVWidgets.activate(slides[n]); }
    try { if (location.hash !== '#'+(n+1)) history.replaceState(null,'','#'+(n+1)); }
    catch(_) { try { location.hash = '#'+(n+1); } catch(__){} }
  }
  const next = () => show(idx+1);
  const prev = () => show(idx-1);

  // Cronómetro de charla: el tiempo transcurrido PERSISTE entre refrescos (sessionStorage);
  // la visibilidad se recuerda (localStorage). Doble clic = reiniciar · tecla T = mostrar/ocultar.
  if (deckTimer) {
    if (localStorage.getItem('deckTimerHidden') === '1') deckTimer.classList.add('hidden');
    let tStart = +sessionStorage.getItem('deckTimerStart') || 0;
    if (!tStart) { tStart = Date.now(); sessionStorage.setItem('deckTimerStart', String(tStart)); }
    const tfmt = ms => { const s = Math.max(0, Math.round(ms/1000)); return pad(Math.floor(s/60)) + ':' + pad(s%60); };
    const ttick = () => { deckTimer.textContent = tfmt(Date.now() - tStart); };
    ttick(); setInterval(ttick, 1000);
    // reset por DOBLE TOQUE / doble clic (en táctil el evento dblclick no dispara de forma fiable;
    // pointerup cubre táctil, ratón y lápiz)
    let lastTap = 0;
    deckTimer.addEventListener('pointerup', () => {
      const now = Date.now();
      if (now - lastTap < 380) { tStart = Date.now(); sessionStorage.setItem('deckTimerStart', String(tStart)); ttick(); lastTap = 0; }
      else lastTap = now;
    });
  }

  addEventListener('keydown', e => {
    switch(e.key){
      case 'ArrowRight': case 'ArrowDown': case 'PageDown': case ' ':
        e.preventDefault(); next(); break;
      case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
        e.preventDefault(); prev(); break;
      case 'Home': show(0); break;
      case 'End': show(N-1); break;
      case 't': case 'T':
        if (deckTimer){ const h = deckTimer.classList.toggle('hidden'); try{ localStorage.setItem('deckTimerHidden', h ? '1' : '0'); }catch(_){} }
        break;
      case 'f': case 'F':
        if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
        break;
    }
  });
  let touchNavAt = 0;
  addEventListener('click', e => {
    if (Date.now() - touchNavAt < 600) return;                 // ya navegado por gesto táctil
    if (e.target.closest('.stage') || e.target.closest('a') || e.target.closest('.hud') || e.target.closest('#deckqr') || e.target.closest('#zenqr')) return;
    (e.clientX > innerWidth/2) ? next() : prev();
  });
  // --- Navegación táctil (móvil/tablet): deslizar o tocar mitad izq/dcha ---
  let tsx = 0, tsy = 0, tMoved = false;
  addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    tsx = e.touches[0].clientX; tsy = e.touches[0].clientY; tMoved = false;
    pokeHint();
  }, { passive: true });
  addEventListener('touchmove', e => {
    const t = e.touches[0]; if (!t) return;
    if (Math.abs(t.clientX - tsx) > 10 || Math.abs(t.clientY - tsy) > 10) tMoved = true;
  }, { passive: true });
  addEventListener('touchend', e => {
    if (e.changedTouches.length !== 1) return;
    if (e.target.closest && (e.target.closest('.stage') || e.target.closest('a') || e.target.closest('.hud') || e.target.closest('#deckqr') || e.target.closest('#zenqr'))) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - tsx, dy = t.clientY - tsy;
    if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)) {     // deslizar horizontal
      (dx < 0) ? next() : prev(); touchNavAt = Date.now(); e.preventDefault();
    } else if (!tMoved) {                                       // toque simple → mitades
      (t.clientX > innerWidth / 2) ? next() : prev(); touchNavAt = Date.now(); e.preventDefault();
    }
  }, { passive: false });

  let hintTimer;
  function pokeHint(){
    document.documentElement.style.setProperty('--hint','0.55');
    clearTimeout(hintTimer);
    hintTimer = setTimeout(()=>document.documentElement.style.setProperty('--hint','0'), 4000);
  }
  addEventListener('keydown', pokeHint); addEventListener('mousemove', pokeHint); pokeHint();

  function loadWidget(){
    const f = document.getElementById('mlvFrame');
    if (!f || f.src) return;
    f.src = f.dataset.src;
    f.addEventListener('load', () => {
      const ph = document.getElementById('mlvPlaceholder');
      if (ph) ph.style.opacity = '0';
    });
  }

  const start = parseInt((location.hash||'').slice(1),10);
  show(Number.isFinite(start) && start>=1 && start<=N ? start-1 : 0);
  // Activa las transiciones SOLO tras el primer pintado (doble rAF): así el slide
  // inicial se pinta ya nítido a opacidad 1 (transition:none) y no arranca un fade a medias.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('deck').classList.add('ready');
    document.getElementById('brandbar').classList.add('ready');
    if (deckqr) deckqr.classList.add('ready');   // habilita la animación de salida solo tras el primer pintado
    if (zenqr) zenqr.classList.add('ready');
  }));

  /* ---------- Motor de olas (canvas) ---------- */
  const canvas = document.getElementById('waves');
  const ctx = canvas.getContext('2d');
  const scaler = document.getElementById('scaler');
  let W=0,H=0,DPR=1;
  // scale-to-fit: el escenario mide 1280×720 fijos y se escala para caber en la
  // pantalla (siempre horizontal). Así se ve idéntico en 1080p, 1440p, 4:3…
  function rescale(){
    scaler.style.setProperty('--scale', Math.min(innerWidth/1280, innerHeight/720));
  }
  function resize(){
    DPR = Math.min(devicePixelRatio||1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = W*DPR; canvas.height = H*DPR;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    rescale();
    seedBubbles();
  }
  addEventListener('resize', resize);

  const SURF = { bgTop:[244,250,253], bgBot:[214,235,247], ink:[20,53,67],   acc:[47,143,176],  acc2:[142,69,133], wave:[103,170,208], hi:[212,236,248] };
  const MID  = { bgTop:[20,78,110],   bgBot:[7,38,60],     ink:[214,236,245], acc:[90,195,230],  acc2:[180,135,205], wave:[80,170,210],  hi:[160,228,255] };
  const DEEP = { bgTop:[10,40,62],    bgBot:[1,6,12],      ink:[214,236,245], acc:[69,200,240],  acc2:[185,138,208], wave:[46,120,150],  hi:[110,220,255] };
  const lerp = (a,b,t)=>a+(b-a)*t;
  const mix  = (c1,c2,t)=>[lerp(c1[0],c2[0],t),lerp(c1[1],c2[1],t),lerp(c1[2],c2[2],t)];
  const pal3 = (a,b,c,t)=> t<0.5 ? mix(a,b,t*2) : mix(b,c,(t-0.5)*2);
  const css  = c => `${Math.round(c[0])},${Math.round(c[1])},${Math.round(c[2])}`;

  depth = parseFloat(slides[idx]?.dataset.depth || '0');

  //  Repartidas en NIVELES DE PROFUNDIDAD: fondo (alto, fino, tenue → a=opacidad baja) hasta
  //  primer plano (bajo, marcado, cresta grande → a=1). El escalón de a + amp da la sensación
  //  de capas/profundidad del template, no una sola banda.
  const RIBBONS = [
    {baseY:0.50, amp:13, spread:64,  lines:16, w1:2.0, w2:3.6, s1:0.17, s2:0.12, ph:3.3, ph2:1.2, a:0.28},
    {baseY:0.585,amp:17, spread:86,  lines:18, w1:1.7, w2:3.0, s1:0.14, s2:0.10, ph:0.7, ph2:4.1, a:0.42},
    {baseY:0.665,amp:21, spread:106, lines:20, w1:1.45,w2:2.6, s1:0.14, s2:0.09, ph:4.0, ph2:2.9, a:0.58},
    {baseY:0.74, amp:27, spread:130, lines:24, w1:1.25,w2:2.3, s1:0.12, s2:0.08, ph:5.2, ph2:3.4, a:0.78},
    {baseY:0.815,amp:34, spread:116, lines:20, w1:1.1, w2:2.0, s1:0.10, s2:0.07, ph:2.0, ph2:0.5, a:1.0, purple:1},
    {baseY:0.895,amp:41, spread:100, lines:16, w1:1.0, w2:1.8, s1:0.09, s2:0.06, ph:1.1, ph2:4.6, a:1.0},
  ];

  let bubbles = [], motes = [], eyes = [];
  let seed = 12345;
  const rnd = () => (seed = (seed*1664525 + 1013904223) >>> 0) / 4294967296;
  const eyeY = () => rnd() < 0.5 ? 0.10 + rnd()*0.32 : 0.58 + rnd()*0.31;   // arriba (0.10–0.42) o abajo (0.58–0.89), evita el texto central
  function seedBubbles(){
    bubbles = Array.from({length:52}, () => ({
      x: rnd()*W, y: rnd()*H, r: rnd()*2.2+0.5, s: rnd()*20+8, drift: rnd()*2-1, ph: rnd()*6.28
    }));
    // "marine snow": motas muy tenues a la deriva → sensación de estar buceando
    motes = Array.from({length:44}, () => ({
      x: rnd()*W, y: rnd()*H, r: rnd()*1.6+0.4, s: rnd()*5+2, dx: rnd()*2-1, ph: rnd()*6.28
    }));
    // campo de ojos en el abismo: POSICIONES FIJAS y SEPARADAS, tamaños variados. Cada par
    // se queda en su sitio y PARPADEA (cierra el párpado de arriba→abajo y lo abre de abajo→arriba).
    // repartidos por ZONAS de la pantalla (esquinas/lados, evitando el centro donde va el texto) con
    // jitter → distribución dispersa, no alineada. Tamaños MUY variados (parecen estar a distintas distancias).
    const zones = [[0.16,0.19],[0.83,0.15],[0.13,0.73],[0.87,0.66],[0.55,0.84]];   // TL · TR · ABAJO-IZQ · abajo-dcha · abajo-centro → cubre las 4 esquinas
    for (let i = zones.length - 1; i > 0; i--){ const j = Math.floor(rnd()*(i+1)); const tmp = zones[i]; zones[i] = zones[j]; zones[j] = tmp; }
    // tamaños sesgados a PEQUEÑOS (más pequeños que grandes, no lineal): 4 pequeños + 1 algo mayor
    const sizes = [3, 3.6, 4.4, 6, 10];
    for (let i = sizes.length - 1; i > 0; i--){ const j = Math.floor(rnd()*(i+1)); const tmp = sizes[i]; sizes[i] = sizes[j]; sizes[j] = tmp; }
    eyes = [];
    for (let i = 0; i < 5; i++){
      const z = zones[i], r = sizes[i] * (0.85 + rnd()*0.3), gap = r*4.6, rx = r*1.95;
      const mx = (gap/2 + rx)/1280 + 0.015, my = (r*0.82)/720 + 0.02;   // margen según tamaño → los grandes no se salen
      const x = Math.max(mx, Math.min(1-mx, z[0] + (rnd()-0.5)*0.12));
      const y = Math.max(my, Math.min(1-my, z[1] + (rnd()-0.5)*0.12));
      eyes.push({ x, y, r, gap, period: 2.3 + rnd()*3.2, phase: rnd(),
        blinkDur: 0.13 + rnd()*0.1 });                             // parpadeo RÁPIDO en segundos (0.13–0.23 s)
    }
  }

  function draw(tms){
    const t = tms/1000;
    // Al cruzar la banda de olas (~0.10–0.45) el ritmo de profundidad baja: así el buceo
    // hacia el abismo (y la emersión de vuelta) se VEN — las olas suben despacio y pasan
    // por encima de la cabeza antes de que caiga la oscuridad. Fuera de la banda, normal.
    const descending = depthTarget > depth;            // bajando al abismo vs subiendo a la superficie
    const inWaveBand = depth > 0.08 && depth < 0.58;   // banda ancha → el descenso es lento y se aprecia
    // asimétrico: BAJA lento (se ve bucear y apagarse la luz) pero SUBE de golpe (emerges en las conclusiones)
    depth += (depthTarget - depth) * (REDUCED ? 1 : (descending ? (inWaveBand ? 0.014 : 0.028) : 0.075));
    // La oscuridad total NO entra de golpe: se engancha a la profundidad. Primero suben
    // las olas; solo cuando ya estamos hundidos (depth alto) empieza a caer el negro (despacio).
    const voidGate = voidTarget * Math.max(0, Math.min(1, (depth - 0.55) / 0.4));
    voidAmt += (voidGate - voidAmt) * (REDUCED ? 1 : (voidGate < voidAmt ? 0.02 : 0.05));   // ZAMBULLIDA rápida (0.05) · EMERGENCIA muy gradual (0.02) → amanecer suave void→CPC18
    const d = depth;
    // PROFUNDIDAD VISUAL: la superficie (d<=0.22: slides de intro y cierre) se queda CLARA y con las
    // olas ABAJO; el oscurecimiento y la subida de olas ocurren DE GOLPE al bucear (d>0.22 → vacío).
    // El ascenso (d>=0.35) queda idéntico (dv==d ahí). Así la intro ya no se oscurece poco a poco.
    const dv = d <= 0.22 ? 0 : (d < 0.35 ? (d - 0.22) / 0.13 * 0.35 : d);

    let bgTop = pal3(SURF.bgTop, MID.bgTop, DEEP.bgTop, dv);
    let bgBot = pal3(SURF.bgBot, MID.bgBot, DEEP.bgBot, dv);
    if (voidAmt > 0.001){ bgTop = mix(bgTop,[0,0,0],voidAmt); bgBot = mix(bgBot,[0,0,0],voidAmt); }
    document.body.style.background = `linear-gradient(180deg, rgb(${css(bgTop)}) 0%, rgb(${css(bgBot)}) 100%)`;
    const root = document.documentElement.style;
    const inkT = Math.min(1, Math.max(0, (dv - 0.25) / 0.10));   // tinta oscura en superficie, clara al bucear (profundidad VISUAL dv)
    root.setProperty('--ink',  css(mix(SURF.ink, DEEP.ink, inkT)));
    root.setProperty('--acc',  css(pal3(SURF.acc,  MID.acc,  DEEP.acc,  dv)));
    root.setProperty('--acc2', css(pal3(SURF.acc2, MID.acc2, DEEP.acc2, dv)));
    // panel de widgets: claro en slides claras, oscuro en oscuras
    const panelT = Math.min(1, Math.max(0, (dv - 0.22) / 0.16));
    root.setProperty('--panel-bg', `rgba(${css(mix([234,243,250],[10,24,38], panelT))},.66)`);
    root.setProperty('--panel-bd', `rgba(${css(mix([120,160,190],[150,190,220], panelT))},.30)`);
    vignette.style.opacity = Math.max(0,(dv-0.35))/0.65 * 0.9;

    ctx.clearRect(0,0,W,H);
    const waveRGB = pal3(SURF.wave, MID.wave, DEEP.wave, dv);
    const hiRGB   = pal3(SURF.hi,   MID.hi,   DEEP.hi,   dv);
    // Las olas SOLO existen cerca de la superficie (d < ~0.25). Bajo el agua no hay olas:
    // el ascenso es agua que se aclara poco a poco; al final "sacas la cabeza" y aparecen de golpe.
    let surf = Math.max(0, Math.min(1, (0.35 - dv) / 0.28));  // olas visibles en superficie; desaparecen al bucear
    surf = surf * surf * (3 - 2 * surf);                    // smoothstep → aparición/desaparición suave
    // Portada y contraportada (depth ~0): olas MÁS intensas (como la plantilla) → sube opacidad,
    // amplitud y grosor SOLO muy cerca de la superficie; las slides de intro (0.05+) quedan igual.
    const surfaceBoost = 1 + 1.35 * Math.max(0, (0.05 - d) / 0.05);
    const globalA = Math.min(1, 0.9 * surf * (1 - voidAmt) * surfaceBoost);
    const glow    = 0;                                       // sin neón; olas de superficie, azul suave
    // Portada/contra (d≈0): olas ALTAS y extendidas (como la plantilla). Intro/cierre (d 0.05–0.22):
    // olas ABAJO para que se lea el contenido. Al bucear (d>0.22): suben y desaparecen.
    const waveCenter = d < 0.05  ? lerp(0.66, 0.90, d / 0.05)
                     : d <= 0.22 ? 0.90
                     :             lerp(0.90, -0.25, Math.min(1, (d - 0.22) / 0.20));
    for (const r of RIBBONS){
      const effBaseY = (waveCenter + (r.baseY - 0.72)) * H;
      const amp    = r.amp * surfaceBoost;
      const spread = r.spread;
      const step   = 14;
      for (let li=0; li<r.lines; li++){
        const f = r.lines>1 ? li/(r.lines-1) : 0.5;
        const edge = Math.abs(f-0.5)*2, coreT = 1-edge;
        const lineA = (0.08 + 0.92*coreT) * globalA * (r.a != null ? r.a : 1);
        if (lineA < 0.02) continue;
        const col = mix(r.purple ? [132,116,182] : waveRGB, hiRGB, coreT*0.7);
        ctx.strokeStyle = `rgba(${css(col)},${lineA.toFixed(3)})`;
        ctx.lineWidth = 1 + 0.6 * (surfaceBoost - 1);
        if (glow>0){ ctx.shadowColor = `rgba(${css(hiRGB)},.8)`; ctx.shadowBlur = glow*coreT; }
        else ctx.shadowBlur = 0;
        ctx.beginPath();
        for (let px=-20; px<=W+20; px+=step){
          const u = px/W;
          const thick = spread * (0.35 + 0.65*Math.abs(Math.sin(u*Math.PI*0.8 + r.ph)));
          const y = effBaseY
                  + Math.sin(u*Math.PI*r.w1 + t*r.s1*6 + r.ph)  * amp
                  + Math.sin(u*Math.PI*r.w2 - t*r.s2*6 + r.ph2) * amp*0.55
                  + (f-0.5)*thick;
          (px<=-20) ? ctx.moveTo(px,y) : ctx.lineTo(px,y);
        }
        ctx.stroke();
      }
    }
    ctx.shadowBlur = 0;

    if (d>0.35 && voidAmt<0.99){
      const ba = Math.min(1,(d-0.35)/0.5) * (1-voidAmt);
      // marine snow: motas tenues a la deriva (continuidad de "estar buceando", sin distraer)
      ctx.fillStyle = `rgba(${css(hiRGB)},${(0.07*ba).toFixed(3)})`;
      for (const m of motes){
        m.y += m.s * 0.012;
        m.x += Math.sin(t*0.4 + m.ph) * 0.22 * m.dx;
        if (m.y > H+8){ m.y = -8; m.x = rnd()*W; }
        ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, 6.2832); ctx.fill();
      }
      // burbujas que ascienden despacio
      ctx.fillStyle = `rgba(${css(hiRGB)},${(0.16*ba).toFixed(3)})`;
      for (const b of bubbles){
        b.y -= b.s * 0.016;
        b.x += Math.sin(t*0.6 + b.ph) * 0.3 * b.drift;
        if (b.y < -10){ b.y = H+10; b.x = rnd()*W; }
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 6.2832); ctx.fill();
      }
    }

    // Ojos que PARPADEAN en el abismo — solo en el vacío total (voidAmt alto): un campo de
    // pares de ojos que abren y cierran a ritmos distintos, como criaturas mirándote en la oscuridad.
    if (voidAmt > 0.15){
      const eyeA = Math.min(1, (voidAmt - 0.15) / 0.6);           // aparecen graduales (no de golpe) al oscurecer
      for (const e of eyes){
        const tcyc = (t + e.phase * e.period) % e.period;         // segundos dentro del ciclo
        let o = 1;                                                // apertura del párpado (1=abierto, 0=cerrado)
        if (tcyc < e.blinkDur) o = Math.abs(tcyc / e.blinkDur - 0.5) * 2;  // parpadeo RÁPIDO (1→0→1 en blinkDur seg)
        if (o < 0.02) continue;                                    // cerrado del todo
        const ex = e.x * W, ey = e.y * H, half = e.gap / 2, rx = e.r * 1.95, ry = e.r * 0.82;  // ojos alargados
        const bandTop = ey - ry + (1 - o) * 2 * ry;               // el borde superior BAJA al cerrar (arriba→abajo)
        ctx.save();
        ctx.beginPath(); ctx.rect(ex - half - rx - 4, bandTop, e.gap + 2*rx + 8, (ey + ry) - bandTop + 1); ctx.clip();  // párpado
        ctx.shadowColor = `rgba(130,215,255,${(0.85*eyeA).toFixed(3)})`; ctx.shadowBlur = 15;
        ctx.fillStyle = `rgba(190,240,255,${(0.95*eyeA).toFixed(3)})`;
        for (const sgn of [-1, 1]){ ctx.beginPath(); ctx.ellipse(ex + sgn*half, ey, rx, ry, 0, 0, 6.2832); ctx.fill(); }
        ctx.shadowBlur = 0; ctx.fillStyle = `rgba(8,22,36,${(0.5*eyeA).toFixed(3)})`;   // pupila
        for (const sgn of [-1, 1]){ ctx.beginPath(); ctx.ellipse(ex + sgn*half, ey, rx*0.3, ry*0.7, 0, 0, 6.2832); ctx.fill(); }
        ctx.restore();
      }
    }

    requestAnimationFrame(draw);
  }

  resize();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
